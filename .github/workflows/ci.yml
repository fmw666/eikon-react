name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20.10'
          cache: 'pnpm'

      # The e2e step exercises the `--pm bun` rewrite end-to-end and, in CI,
      # hard-fails if bun is missing (scripts/e2e.mjs) rather than silently
      # skipping it — so bun must be on PATH on every runner.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.30'

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify
        env:
          CI: '1'
