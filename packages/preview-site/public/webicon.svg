<svg xmlns="http://www.w3.org/2000/svg" viewBox="24 20 132 72" role="img" aria-labelledby="title desc">
  <title id="title">Eikon React handwritten mark</title>
  <desc id="desc">A transparent animated one-line drawing that writes the letters er.</desc>
  <defs>
    <linearGradient id="ink-gradient" x1="30" y1="72" x2="148" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbe8bf" />
      <stop offset="0.58" stop-color="#f7cd8d" />
      <stop offset="1" stop-color="#eda75c" />
    </linearGradient>
    <filter id="ink-softness" x="-18%" y="-24%" width="136%" height="148%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.24" result="soft" />
      <feMerge>
        <feMergeNode in="soft" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="ink-glow" x="-28%" y="-36%" width="156%" height="172%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="glow" />
      <feColorMatrix
        in="glow"
        type="matrix"
        values="1 0 0 0 0.88  0 1 0 0 0.58  0 0 1 0 0.24  0 0 0 0.14 0"
      />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .mark {
        fill: none;
        stroke: url(#ink-gradient);
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#ink-softness);
      }

      .mark-glow {
        fill: none;
        stroke: #f7cd8d;
        /* butt caps + the glow path stops short of the "r" terminal
           (see its `d`): the blurred glow would otherwise bloom into
           a stray light dot at the isolated stroke end. */
        stroke-linecap: butt;
        stroke-linejoin: round;
        stroke-width: 8.8;
        opacity: 0.06;
        filter: url(#ink-glow);
      }

      .mark-shadow {
        fill: none;
        stroke: #0a0a0a;
        stroke-linecap: butt;
        stroke-linejoin: round;
        stroke-width: 6.6;
        opacity: 0.2;
        transform: translate(1.8px, 2.2px);
      }

      .main-line {
        stroke-width: 4.9;
        /* butt caps: a round cap renders a stray dot whenever the
           dash length hits 0 (animation start / each reset) — butt
           draws nothing at zero length, killing the artifact. The
           ink-softness blur keeps the flat ends visually soft. */
        stroke-linecap: butt;
        stroke-dasharray: 1;
        stroke-dashoffset: 0;
        animation: write-cycle 9.5s linear 1.2s infinite;
      }

      .paper-grain {
        opacity: 0.34;
        mix-blend-mode: screen;
      }

      @keyframes write-cycle {
        0% {
          opacity: 0;
          stroke-dashoffset: 1;
          transform: translateY(0.8px);
        }

        3% {
          opacity: 0.66;
          stroke-dashoffset: 1;
          transform: translateY(0.8px);
        }

        7% {
          opacity: 0.72;
          stroke-dashoffset: 0.72;
          transform: translateY(0.25px);
        }

        11% {
          stroke-dashoffset: 0.64;
          transform: translateY(0.2px);
        }

        18% {
          stroke-dashoffset: 0.35;
          transform: translateY(-0.2px);
        }

        22% {
          stroke-dashoffset: 0.3;
          transform: translateY(-0.25px);
        }

        29% {
          stroke-dashoffset: 0.08;
          transform: translateY(-0.6px);
        }

        34%,
        100% {
          opacity: 0.74;
          stroke-dashoffset: 0;
          transform: translateY(-0.7px);
        }
      }

      @media (prefers-color-scheme: dark) {
        .mark-shadow {
          opacity: 0.22;
        }
      }

      @media (prefers-color-scheme: light) {
        .mark {
          stroke: #111111;
        }

        .mark-glow {
          stroke: #111111;
          opacity: 0.05;
        }

        .mark-shadow {
          opacity: 0.08;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .main-line {
          animation: none;
        }

        .main-line {
          stroke-dashoffset: 0;
        }
      }
    </style>
  </defs>

  <g aria-hidden="true">
    <path
      class="mark-glow"
      d="M 38 70
         C 52 60, 64 35, 54 34
         C 38 33, 38 76, 55 75
         C 65 74, 73 62, 80 43
         C 83 36, 91 35, 94 40
         C 97 45, 91 50, 84 51
         C 92 48, 100 45, 108 46
         C 118 47, 116 57, 105 62
         C 114 59, 122 55, 129 51"
    />
    <path
      class="mark-shadow"
      d="M 38 70
         C 52 60, 64 35, 54 34
         C 38 33, 38 76, 55 75
         C 65 74, 73 62, 80 43
         C 83 36, 91 35, 94 40
         C 97 45, 91 50, 84 51
         C 92 48, 100 45, 108 46
         C 118 47, 116 57, 105 62
         C 116 60, 128 52, 138 45"
    />
    <path
      class="mark main-line"
      pathLength="1"
      d="M 38 70
         C 52 60, 64 35, 54 34
         C 38 33, 38 76, 55 75
         C 65 74, 73 62, 80 43
         C 83 36, 91 35, 94 40
         C 97 45, 91 50, 84 51
         C 92 48, 100 45, 108 46
         C 118 47, 116 57, 105 62
         C 116 60, 128 52, 138 45"
    />
  </g>
</svg>
