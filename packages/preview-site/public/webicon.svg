<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 110" role="img" aria-labelledby="title desc">
  <title id="title">Eikon React handwritten mark</title>
  <desc id="desc">A transparent animated one-line drawing that writes the letters er.</desc>
  <defs>
    <filter id="ink-softness" x="-12%" y="-16%" width="124%" height="132%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.22" result="soft" />
      <feMerge>
        <feMergeNode in="soft" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .mark {
        fill: none;
        stroke: #111111;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#ink-softness);
      }

      .main-line {
        stroke-width: 4.6;
        stroke-dasharray: 235;
        stroke-dashoffset: 235;
        animation: write 1.65s cubic-bezier(0.22, 1, 0.36, 1) forwards,
          breathe 3.8s ease-in-out 1.65s infinite;
      }

      @keyframes write {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.9;
          transform: translateY(0);
        }

        50% {
          opacity: 1;
          transform: translateY(-0.7px);
        }
      }

      @media (prefers-color-scheme: dark) {
        .mark {
          stroke: #f7f2e8;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .main-line {
          animation: none;
        }

        .main-line {
          stroke-dashoffset: 0;
        }
      }
    </style>
  </defs>

  <g aria-hidden="true">
    <path
      class="mark main-line"
      d="M 40 70
         C 55 60, 65 35, 55 35
         C 40 35, 40 75, 55 75
         C 65 75, 75 45, 75 38
         C 75 32, 70 32, 72 38
         C 74 50, 85 50, 92 38
         C 92 75, 105 75, 120 55"
    />
  </g>
</svg>
