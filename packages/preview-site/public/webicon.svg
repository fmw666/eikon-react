<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 110" role="img" aria-labelledby="title desc">
  <title id="title">Eikon React handwritten mark</title>
  <desc id="desc">A transparent animated one-line drawing that writes the letters er.</desc>
  <defs>
    <filter id="ink-softness" x="-12%" y="-16%" width="124%" height="132%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.22" result="soft" />
      <feMerge>
        <feMergeNode in="soft" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .mark {
        fill: none;
        stroke: #111111;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#ink-softness);
      }

      .main-line {
        stroke-width: 4.6;
        stroke-dasharray: 1;
        stroke-dashoffset: 0;
        animation: write-cycle 6.65s cubic-bezier(0.22, 1, 0.36, 1) 5s infinite;
      }

      @keyframes write-cycle {
        0% {
          opacity: 0.9;
          stroke-dashoffset: 1;
          transform: translateY(0);
        }

        24.8%,
        100% {
          opacity: 1;
          stroke-dashoffset: 0;
          transform: translateY(-0.7px);
        }
      }

      @media (prefers-color-scheme: dark) {
        .mark {
          stroke: #f7f2e8;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .main-line {
          animation: none;
        }

        .main-line {
          stroke-dashoffset: 0;
        }
      }
    </style>
  </defs>

  <g aria-hidden="true">
    <path
      class="mark main-line"
      pathLength="1"
      d="M 40 70
         C 55 60, 65 35, 55 35
         C 40 35, 40 75, 55 75
         C 64 74, 73 61, 80 43
         C 83 37, 90 36, 93 40
         C 96 44, 91 49, 84 51
         C 91 48, 98 45, 105 46
         C 114 47, 112 56, 103 61
         C 112 59, 122 53, 130 46"
    />
  </g>
</svg>
