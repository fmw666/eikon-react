<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!--
      `viewport-fit=cover` is universal: desktop browsers ignore the
      keyword, mobile browsers use it to let `env(safe-area-inset-*)`
      resolve to non-zero values on devices with rounded corners /
      notches / home-indicator bars (iOS Safari, Android with display
      cutouts). The mobile layouts (MobileDrawer / BottomTabs /
      BottomTabsFab) — and the platform-agnostic Centered layout
      when scaffolded for `--platform mobile` — read these insets
      to pad chrome away from physical obstructions.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="description" content="Eikon React starter" />
    <meta name="theme-color" content="#0a0a0a" />
    <!-- @eikon:variant(platform=mobile) begin -->
    <!--
      iOS / Android PWA hooks. `apple-mobile-web-app-capable` enables
      full-screen "Add to Home Screen" mode (no Safari chrome); the
      status-bar style `black-translucent` keeps the system status bar
      visible but lets the app draw under it, which pairs with the
      `safe-area-inset-top` padding in the mobile layouts. These tags
      are stripped from web / desktop scaffolds because they have no
      effect outside an installed-PWA / mobile-Safari context — see the
      block-level `@eikon:variant(platform=mobile)` marker that wraps
      them, processed by `packages/create-eikon-react/src/strip-features.ts`.
    -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- @eikon:variant(platform=mobile) end -->
    <!-- @eikon:variant(design=claymorphism) begin -->
    <!--
      Fredoka — the rounded display face that Adrian Bece uses across the
      clay.css demo site (codeadrian.github.io/clay.css). The chunky,
      friendly silhouette is half of what makes a clay UI feel "designed"
      rather than "rounded-rectangle-with-shadow". We preconnect + load
      it eagerly because it drives the first paint of every headline.
      It is used for both body and display text in this preset so the
      clay UI keeps one cohesive, chunky voice. It falls back to sans-serif
      on networks that block Google Fonts — see --font-sans / --font-display
      in src/styles/index.css.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap"
      rel="stylesheet"
    />
    <!-- @eikon:variant(design=claymorphism) end -->
    <!-- @eikon:variant(design=animal-crossing) begin -->
    <!--
      The exact three-family stack animal-island-ui ships: Nunito (rounded
      Latin primary), Noto Sans SC (Simplified-Chinese cover), and Zen Maru
      Gothic (the rounded Japanese gothic that gives the UI its soft,
      friendly silhouette). Loaded eagerly because the rounded face drives
      the first paint; falls back to PingFang / Hiragino / system on networks
      that block Google Fonts — see --font-sans / --font-display in
      src/styles/index.css. Weights 400–900 so body=500, buttons/titles=700,
      and the big clock-style numerals=900 all resolve.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- @eikon:variant(design=animal-crossing) end -->
    <!-- @eikon:variant(design=evomap) begin -->
    <!--
      EvoMap's DESIGN.md typography: Outfit for display/section titles,
      Inter for dense product UI, and JetBrains Mono for code/API surfaces.
      Loaded only when the evomap design block survives scaffold stripping.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- @eikon:variant(design=evomap) end -->
    <!-- @eikon:variant(design=pixel) begin -->
    <!--
      Press Start 2P — the canonical bitmap pixel face — for headlines, over
      Space Mono (retro monospace) for body / UI. Both are SIL OFL fonts on
      Google Fonts; loaded eagerly because the pixel face defines the first
      paint of every title. They fall back to ui-monospace / system mono on
      networks that block Google Fonts — see --font-display / --font-sans in
      src/styles/index.css. Each ships a single weight (Press Start 2P 400,
      Space Mono 400/700), which is all the pixel preset asks for.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- @eikon:variant(design=pixel) end -->
    <title>Eikon App</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var resolved = stored
            ? (function (t) {
                try {
                  return JSON.parse(t);
                } catch (e) {
                  return t;
                }
              })(stored)
            : 'system';
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = resolved === 'dark' || (resolved !== 'light' && prefersDark);
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(isDark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
